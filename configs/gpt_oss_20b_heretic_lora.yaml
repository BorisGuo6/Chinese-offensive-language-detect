model_name_or_path: models/p-e-w/gpt-oss-20b-heretic
train_file: data/processed/zhatebench_sft_train.jsonl
eval_file: data/processed/zhatebench_sft_validation.jsonl
test_file: data/processed/zhatebench_sft_test.jsonl
output_dir: outputs/gpt-oss-20b-heretic-lora
max_length: 1024
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0002
weight_decay: 0.0
num_train_epochs: 2.0
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 200
save_steps: 200
save_total_limit: 2
seed: 42
attn_implementation: eager
torch_dtype: bfloat16
device_map: auto
use_mxfp4: true
dequantize_mxfp4: true
gradient_checkpointing: true
assistant_only_loss: true
report_to: []
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: all-linear
target_parameters:
  - 7.mlp.experts.gate_up_proj
  - 7.mlp.experts.down_proj
  - 15.mlp.experts.gate_up_proj
  - 15.mlp.experts.down_proj
  - 23.mlp.experts.gate_up_proj
  - 23.mlp.experts.down_proj
max_new_tokens: 64
